<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Guess the Number Game!</title>
        <link rel="stylesheet" href="guessing_game.css">
    </head>
    <body>
        <h2 id="main-heading">Guess the Number!</h2>
        <div class="game-container">
            <input id="number-input" type="number" step="1" min="1" placeholder="Number" class="inputs" required>
            <button id="guess-btn">Guess</button>
            <input id="max-number-input" type="number" step="1" min="1" placeholder="Max Number" class="inputs" required>
            <input id="guess-limit" type="number" step="1" min="1" placeholder="Guess Limit" class="inputs" required>
            <h2 id="guesses-left-heading"></h2>
            <h2 id="guess-status">Please enter values in all three boxes</h2>
            <button id="reset-btn">Reset</button>
        </div>
        <script src="guessing_game.js"></script>
    </body>
</html>
